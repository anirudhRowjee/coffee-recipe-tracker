{% extends 'base.html' %}

{% block content %}
<div class="grid">
    <section class="card">
        <h2>Select bag + brewer + grinder</h2>
        <form id="picker-form" hx-get="/recipes/latest" hx-target="#latest-wing" hx-trigger="change"
            class="stacked-form">
            <div class="form-group">
                <label>Bag</label>
                <select id="bag-select" name="bag_id" required>
                    <option value="" disabled selected>Choose a bag</option>
                    {% for bag, remaining in bags_with_remaining %}
                    {% if not bag.is_completed %}
                    <option value="{{ bag.id }}">
                        {{ bag.bean.name }}
                        {% if bag.roast_date %} · {{ bag.roast_date.strftime('%b %d') }}{% endif %}
                        · {{ remaining|int }}g remaining
                        {% if bag.is_frozen %} ❄{% endif %}
                        {% if remaining <= bag.low_threshold_g %} ⚠{% endif %}
                    </option>
                    {% endif %}
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Brewer</label>
                <select id="brewer-select" name="brewer_id" required>
                    <option value="" disabled selected>Choose</option>
                    {% for brewer in brewers %}
                    <option value="{{ brewer.id }}">{{ brewer.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Grinder</label>
                <select id="grinder-select" name="grinder_id" required>
                    <option value="" disabled selected>Choose</option>
                    {% for grinder in grinders %}
                    <option value="{{ grinder.id }}">{{ grinder.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </form>
    </section>

    <section class="card" id="latest-wing">
        <h2>Latest recipe</h2>
        <p>Select a bag, brewer, and grinder to load the recipe.</p>
    </section>
</div>
{% endblock %}
